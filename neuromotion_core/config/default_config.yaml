# default_config.yaml
project: "NeuroMotion-ADS"
seed: 42

data:
  window_size: 150      # 10s at 30FPS
  fps: 30
  num_joints: 17         # COCO format
  gaze_dim: 4            # yaw, pitch, blink_rate, interaction_density

model:
  d_model: 256
  st_gcn_layers: 4
  tcn_channels: [64, 128, 256]
  transformer_layers: 4
  n_heads: 8
  dropout: 0.1
  latent_dim: 256

training:
  batch_size: 32
  learning_rate: 1e-4
  weight_decay: 1e-5
  max_epochs: 100
  ssl_temperature: 0.07  # InfoNCE tau
  lambda_infonce: 1.0
  lambda_mse: 0.0        # Set > 0 during fine-tuning
  lambda_reg: 1e-4
